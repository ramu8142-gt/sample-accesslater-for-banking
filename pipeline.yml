pipelines:

  - run_id: "9f12ab34"

    pipeline_name: "Sales_Ingestion"

    environment: "dev"

    dependency: ""

    created_at: "2026-05-14T18:30:00"

    execution_mode: "batch"


    source:
      name: "sales_source"

      path: "raw/sales/input.csv"

      format: "csv"

      connection_string: "storage-connection-secret"


    target:
      catalog: "main"

      schema: "sales"

      layer: "bronze"

      table: "sales_cleaned"


    adf:
      factory_name: "adf-acl-ztetl-dev-in-01"

      pipeline_name: "zero_touch_etl_pipeline"


