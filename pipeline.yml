      azure_sql_db:
        runtime_hours: 2
        estimated_cost_usd: "1.60"


      linked_services:
        count: 3
        estimated_cost_usd: "0.00"


      azure_key_vault:
        secret_operations: 1000
        estimated_cost_usd: "0.003"


      adls_storage:
        storage_gb: 5
        estimated_cost_usd: "0.10"


      total_estimated_cost_usd: "4.35"